name: Build Thadm

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (all, macos, windows, linux)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - windows
          - linux

concurrency:
  group: build-thadm-${{ github.sha }}
  cancel-in-progress: true

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  # ─────────────────────────────────────────────
  # macOS (Apple Silicon + Intel)
  # ─────────────────────────────────────────────
  build-macos:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos' }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/screenpipe-app-tauri/src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Import Apple Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Install dependencies
        working-directory: apps/screenpipe-app-tauri
        run: bun install

      - name: Build Tauri app
        working-directory: apps/screenpipe-app-tauri
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bun run tauri build --target ${{ matrix.target }} --config src-tauri/tauri.prod.conf.json

      - name: Verify signature
        run: |
          APP=$(find apps/screenpipe-app-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            codesign --verify --deep --strict "$APP"
            echo "Signature valid: $APP"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thadm-macos-${{ matrix.arch }}
          path: |
            apps/screenpipe-app-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/screenpipe-app-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 30

  # ─────────────────────────────────────────────
  # Windows
  # ─────────────────────────────────────────────
  build-windows:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/screenpipe-app-tauri/src-tauri/target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install dependencies
        working-directory: apps/screenpipe-app-tauri
        run: bun install

      - name: Build Tauri app
        working-directory: apps/screenpipe-app-tauri
        run: |
          bun run tauri build --config src-tauri/tauri.prod.conf.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thadm-windows-x64
          path: |
            apps/screenpipe-app-tauri/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ─────────────────────────────────────────────
  # Linux
  # ─────────────────────────────────────────────
  build-linux:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libxdo-dev \
            tesseract-ocr \
            libtesseract-dev \
            ffmpeg

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/screenpipe-app-tauri/src-tauri/target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install dependencies
        working-directory: apps/screenpipe-app-tauri
        run: bun install

      - name: Build Tauri app
        working-directory: apps/screenpipe-app-tauri
        run: |
          bun run tauri build --config src-tauri/tauri.prod.conf.json

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thadm-linux-x64
          path: |
            apps/screenpipe-app-tauri/src-tauri/target/release/bundle/deb/*.deb
            apps/screenpipe-app-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
